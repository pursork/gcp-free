# Fastly IP list source definition
# FORMAT: fastly_json — parses {"addresses":[...],"ipv6_addresses":[...]}

PROVIDER_NAME="Fastly"
PROVIDER_FORMAT="fastly_json"
PROVIDER_IPV4_URL="https://api.fastly.com/public-ip-list"
PROVIDER_IPV6_URL="https://api.fastly.com/public-ip-list"
PROVIDER_IPV4_JQ=".addresses[]"
PROVIDER_IPV6_JQ=".ipv6_addresses[]"
